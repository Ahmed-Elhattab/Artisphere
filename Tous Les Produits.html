<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTD-8" />
        <title>Catalogue - Tous les produits</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header class="main-header">
            <div class="logo">
                <img src="Screenshot 2025-12-10 201124.png" alt="Artisphère">
            </div>

            <nav class="main-nav">
                <a href="#">CATALOGUE</a>
                <a href="#">ARTISAN</a>
                <a href="#">EVENEMENT</a>
                <a href="#">PROFIL</a>
            </nav>

        </header>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- LEFT SIDEBAR -->
            <aside class="sidebar">
                <!-- search form -->
                <form class="search-form">
                    <input type="search" placeholder="Rechercher">
                </form>

            
                <div class="categories-title">CATEGORIES :</div>
                <ul class="categories-list">
                    <li><a href="#" class="active">TOUS LES PRODUITS</a></li>
                    <li><a href="#">TABLEAUX</a></li>
                    <li><a href="#">ARTISANAT</a></li>
                </ul>

            </aside>

            <!-- RIGHT PRODUCTS AREA -->
            <section class="products">
                <h1 class="products-title">TOUS LES PRODUITS</h1>

                <div class="product-grid">
                    <!-- 1st row -->
                    <div class="product-card">
                        <img src="Screenshot 2025-12-11 143128.png" alt="Produit 1">
                        <div class="price-tag">TABLE : 200€</div>
                    </div>
 
                    <div class="product-card">
                        <img src="Screenshot 2025-12-11 143322.png" alt="Produit 2">
                        <div class="price-tag">TABLE : 200€</div>
                    </div>
 
                    <div class="product-card">
                        <img src="Screenshot 2025-12-11 143338.png" alt="Produit 3">
                        <div class="price-tag">TABLE : 200€</div>
                    </div>
 
                    <div class="product-card">
                        <img src="Screenshot 2025-12-11 144233.png" alt="Produit 4">
                        <div class="price-tag">TABLE : 200€</div>
                    </div>

                    <!-- 2nd row -->
                    <div class="product-card">
                        <img src="Screenshot 2025-12-11 143349.png" alt="Produit 5">
                        <div class="price-tag">TABLE : 200€</div>
                    </div>
 
                    <div class="product-card">
                        <img src="Screenshot 2025-12-11 143358.png" alt="Produit 6">
                        <div class="price-tag">TABLE : 200€</div>
                    </div>

                    <div class="product-card">
                        <img src="Screenshot 2025-12-11 143407.png" alt="Produit 7">
                        <div class="price-tag">TABLE : 200€</div>
                    </div>

                    <div class="product-card">
                        <img src="Screenshot 2025-12-11 143419.png" alt="Produit 8">
                        <div class="price-tag">TABLE : 200€</div>
                    </div>
                </div>

                
                <!-- arrow on the right -->
                <button class="arrow-next">&#8250;</button>
            
            </section>


        </main>

        <footer class="main-footer">
            <ul class="footer-links">
                <li><a href="#">A PROPOS DE NOUS</a></li>
                <li><a href="#">Mentions légales</a></li>
                <li><a href="#">FAQ</a></li>
            </ul>
        </footer>



    </body>

</html>
