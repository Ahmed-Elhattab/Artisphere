<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="styles_Thushjan.css">
    <meta charset="UTF-8">
    <title>Front</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="header.css">
    <title>Document</title>

<body id="Forum">

<!-- HEADER (identique FAQ / Événements) -->
<header class="site-header">
    <div class="header-inner">

        <div class="logo-zone">
             <img src="../public/images/logo_site.png" alt="Logo Artisphere" class="logo-img">
        </div>

        <nav class="main-nav">
            <a href="index.html" class="nav-link">Catalogue</a>
            <a href="artisans.html" class="nav-link active">Artisan</a>
            <a href="evenement.html" class="nav-link">Évènement</a>
        </nav>

        <a href="profil.html" class="profile-icon" aria-label="Mon profil">
            <span>👤</span>
        </a>
    </div>
</header>


<!-- Contenue -->

<header class="top">
  <div class="container">
    <div class="search-container">
    <h1>Forum Communautaire</h1>
    <div class="search-box">
      <input type="text" placeholder="Recherche">
      <button>🔍</button>
    </div>
   <img src="../public/images/Communauté.png" class="image-communauté"/>
   </div>
  </div>
</header>


<div class="barre"></div>

<main class="container forum-layout">

  <!-- MAIN -->
  <section class="topics">

    <div class="toolbar">
      <div class="filtres">
        <button id="btn-recent" class="active" onclick="trierRecent()">Récents</button>
        <button id="btn-ancien" onclick="trierAncien()">Anciens</button>
      </div>
      <button class="new-topic" onclick="openFenetresujet()">➕ Créer un Topic</button> <!-- Ouvre une fenetre de création de sujet -->
    </div>

<!-- Aucun sujet -->
    <div id="vide" class="vide">
      Aucun sujet pour l'instant. Lancez le premier 🚀
    </div>

<!-- Plusieurs sujet -->
    <div id="topicsList"></div>
  </section>

<!-- Sidebar -->
  <aside class="sidebar">
    <h3>Communauté</h3>
    <p>Lancez des sujets, partagez vos idées et aidez la communauté.</p>
  </aside>

</main>

<!-- Fenetre-sujet -->
<div id="Fenetresujet" class="Fenetresujet">
  <div class="Fenetresujet-contenu">
    <h2>Créer un sujet de discussion</h2>
    <input id="title" placeholder="Titre du sujet">
    <textarea id="content" placeholder="Ecrit ton message..."></textarea>
    <div class="Fenetresujet-actions">
      <button onclick="closeFenetresujet()">Annuler</button>
      <button onclick="createTopic()">Publier</button>
    </div>
  </div>
</div>


<script src="forum-js.js"></script>


<!-- FOOTER -->
<footer class="site-footer">
    <div class="footer-inner">
        <a href="apropos.html" class="footer-link">À propos de nous</a>
        <a href="mentions.html" class="footer-link">Mentions légales</a>
        <a href="faq.html" class="footer-link">FAQ</a>
    </div>
</footer>

</body>
</html>
